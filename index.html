<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ludo</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- BOARD GAME CONTAINER -->

        <div id="game-container">
            <div class="board" id="board">
                <div class="path-area" id="path-area"></div>

                <div class="center-square" id="center-square"></div>
            </div>

            <div class="controls">
                <div id="dice-container">
                    <div id="dice" onclick="rollDice()">
                        <div class="cube" id="cube" data-dice="1">
                            <div class="face front" data-value="1">
                                <span class="dot"></span>
                            </div>
                            <div class="face back-dice" data-value="6">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="face right" data-value="3">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="face left" data-value="4">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="face top" data-value="2">
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                            <div class="face bottom" data-value="5">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN MENU -->

        <div id="main-menu">
            <h1 class="game-title">Ludo</h1>

            <span id="game-title">@arfrhmn21_</span>
            <div class="menu-buttons">
                <button id="vs-computer-btn" onclick="vsComputer()">
                    VS Computer
                </button>
                <button id="vs-player-btn" onclick="vsPlayer()">
                    VS Player
                </button>
                <button id="settings" onclick="openSettings()">Settings</button>
            </div>
        </div>

        <!-- MENU VS PLAYER -->

        <div id="menu-select-player" class="main-menu" style="display: none">
            <div class="back"></div>
            <span class="vs-player-title">Select Number of Players</span>

            <div class="button-area">
                <button id="btn-2p">2 Players</button>
                <button id="btn-3p">3 Players</button>
                <button id="btn-4p">4 Players</button>
            </div>

            <div id="select-player-container">
                <div id="menu-2player" class="player-config">
                    <div class="player-row" data-player="1">
                        <span>P1:</span>
                        <div class="color-options">
                            <button
                                class="color-btn red"
                                data-color="red"
                            ></button>
                            <button
                                class="color-btn blue"
                                data-color="blue"
                            ></button>
                            <button
                                class="color-btn green"
                                data-color="green"
                            ></button>
                            <button
                                class="color-btn yellow"
                                data-color="yellow"
                            ></button>
                        </div>
                    </div>
                    <div class="player-row" data-player="2">
                        <span>P2:</span>
                        <div class="color-options">
                            <button
                                class="color-btn red"
                                data-color="red"
                            ></button>
                            <button
                                class="color-btn blue"
                                data-color="blue"
                            ></button>
                            <button
                                class="color-btn green"
                                data-color="green"
                            ></button>
                            <button
                                class="color-btn yellow"
                                data-color="yellow"
                            ></button>
                        </div>
                    </div>
                </div>

                <div
                    id="menu-3player"
                    class="player-config"
                    style="display: none"
                >
                    <div class="player-row" data-player="1">
                        <span>P1:</span>
                        <div class="color-options">
                            <button
                                class="color-btn red"
                                data-color="red"
                            ></button>
                            <button
                                class="color-btn blue"
                                data-color="blue"
                            ></button>
                            <button
                                class="color-btn green"
                                data-color="green"
                            ></button>
                            <button
                                class="color-btn yellow"
                                data-color="yellow"
                            ></button>
                        </div>
                    </div>
                    <div class="player-row" data-player="2">
                        <span>P2:</span>
                        <div class="color-options">
                            <button
                                class="color-btn red"
                                data-color="red"
                            ></button>
                            <button
                                class="color-btn blue"
                                data-color="blue"
                            ></button>
                            <button
                                class="color-btn green"
                                data-color="green"
                            ></button>
                            <button
                                class="color-btn yellow"
                                data-color="yellow"
                            ></button>
                        </div>
                    </div>
                    <div class="player-row" data-player="3">
                        <span>P3:</span>
                        <div class="color-options">
                            <button
                                class="color-btn red"
                                data-color="red"
                            ></button>
                            <button
                                class="color-btn blue"
                                data-color="blue"
                            ></button>
                            <button
                                class="color-btn green"
                                data-color="green"
                            ></button>
                            <button
                                class="color-btn yellow"
                                data-color="yellow"
                            ></button>
                        </div>
                    </div>
                </div>

                <div
                    id="menu-4player"
                    class="player-config"
                    style="display: none"
                >
                    <p class="info-text">
                        All colors will be automatically assigned.
                    </p>
                    <div class="color-options disabled">
                        <button
                            class="color-btn red selected"
                            data-color="red"
                            style="cursor: default"
                            disabled
                        ></button>
                        <button
                            class="color-btn blue selected"
                            data-color="blue"
                            style="cursor: default"
                            disabled
                        ></button>
                        <button
                            class="color-btn green selected"
                            data-color="green"
                            style="cursor: default"
                            disabled
                        ></button>
                        <button
                            class="color-btn yellow selected"
                            data-color="yellow"
                            style="cursor: default"
                            disabled
                        ></button>
                    </div>
                </div>
            </div>

            <div class="menu-select-player-action">
                <button class="play-btn">START GAME</button>
            </div>
        </div>

        <!-- MENU VS BOT -->

        <div id="menu-vs-bot" class="main-menu" style="display: none">
            <div class="back"></div>
            <span class="vs-bot-title">Select Number of Computers</span>

            <div class="button-area">
                <button id="1-bot">1 Computer</button>
                <button id="2-bot">2 Computers</button>
                <button id="3-bot">3 Computers</button>
            </div>

            <div class="player-config">
                <p>Choose Your Color</p>
                <div class="color-options">
                    <div
                        class="color-btn"
                        data-color="red"
                        style="background: #e74c3c"
                    ></div>
                    <div
                        class="color-btn"
                        data-color="green"
                        style="background: #2ecc71"
                    ></div>
                    <div
                        class="color-btn"
                        data-color="blue"
                        style="background: #3498db"
                    ></div>
                    <div
                        class="color-btn"
                        data-color="yellow"
                        style="background: #f1c40f"
                    ></div>
                </div>
            </div>

            <div class="menu-select-player-action">
                <button class="play-btn">START GAME</button>
            </div>
        </div>

        <!-- SETTINGS -->

        <div id="settings-modal" class="settings-overlay" style="display: none">
            <div class="settings-content">
                <h2>Settings</h2>
                <div class="setting-item">
                    <span class="title-theme">Theme Mode</span>
                    <div class="theme-switch">
                        <button id="theme-light" onclick="setTheme('light')">
                            Light
                        </button>
                        <button id="theme-dark" onclick="setTheme('dark')">
                            Dark
                        </button>
                    </div>
                    <span class="title-mode">Computers Difficulty</span>
                    <div class="select-difficulty">
                        <button id="easy-mode"></button>
                        <button id="normal-mode"></button>
                        <button id="hard-mode"></button>
                    </div>
                </div>
                <button class="close-settings" onclick="closeSettings()">
                    Save & Close
                </button>
            </div>
        </div>

        <!-- RESULT OVERLAY -->

        <div id="result-overlay" class="result-overlay" style="display: none">
            <div class="result-content">
                <h2 id="result-text"></h2>
                <p class="match-time">
                    Match Duration: <span id="finish-time">00:00</span>
                </p>

                <table id="stats-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stats-body"></tbody>
                </table>

                <button class="play-again-btn" onclick="location.reload()">
                    PLAY AGAIN
                </button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
